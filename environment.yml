name: metasieve
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # ---- Python + CUDA toolchain (conda handles these natively) ----
  - python=3.12.9
  - pip

  # ---- PyTorch stack with CUDA 12.1 ----
  - pytorch=2.5.1
  - torchvision=0.20.1
  - torchaudio=2.5.1
  - pytorch-cuda=12.1

  # ---- Everything else via pip ----
  - pip:
      # PyG extensions (require the PyG wheel index)
      - --extra-index-url https://data.pyg.org/whl/torch-2.5.0+cu121.html
      - pyg_lib==0.4.0+pt25cu121
      - torch_cluster==1.6.3+pt25cu121
      - torch_scatter==2.1.2+pt25cu121
      - torch_sparse==0.6.18+pt25cu121
      - torch_spline_conv==1.2.2+pt25cu121

      # PyG core + relbench
      - torch-geometric==2.6.1
      - pytorch-frame==0.3.0
      - relbench==2.1.0

      # Scientific stack
      - numpy==2.2.3
      - scipy==1.15.2
      - pandas==2.2.3
      - scikit-learn==1.6.1
      - matplotlib==3.10.1
      - pillow==11.1.0
      - pyarrow==22.0.0
      - duckdb==1.2.0
      - h5py==3.15.1
      - networkx==3.4.2
      - joblib==1.4.2
      - threadpoolctl==3.5.0
      - tqdm==4.67.1
      - PyYAML==6.0.2
      - psutil==7.0.0
      - tabulate==0.9.0
      - einops==0.8.2

      # HuggingFace stack
      - transformers==4.49.0
      - tokenizers==0.21.0
      - huggingface-hub==0.29.1
      - sentence-transformers==3.4.1
      - safetensors==0.5.3
      - accelerate==1.4.0
      - datasets==4.5.0
      - diffusers==0.32.2
      - regex==2024.11.6

      # TensorBoard / logging
      - tensorboard==2.19.0
      - tensorboard-data-server==0.7.2
      - absl-py==2.1.0
      - grpcio==1.70.0
      - protobuf==5.29.3
      - Markdown==3.7
      - Werkzeug==3.1.3
      - termcolor==2.5.0

      # HTTP / async / utilities
      - requests==2.32.3
      - urllib3==2.3.0
      - certifi==2025.1.31
      - charset-normalizer==3.4.1
      - idna==3.10
      - httpx==0.28.1
      - httpcore==1.0.9
      - h11==0.16.0
      - anyio==4.12.1
      - aiohttp==3.11.13
      - aiohappyeyeballs==2.4.6
      - aiosignal==1.3.2
      - frozenlist==1.5.0
      - multidict==6.1.0
      - yarl==1.18.3
      - propcache==0.3.0

      # Filesystem / caching
      - fsspec==2025.2.0
      - filelock==3.17.0
      - platformdirs==4.3.6
      - pooch==1.8.2

      # Data processing helpers
      - dill==0.4.0
      - multiprocess==0.70.18
      - xxhash==3.6.0
      - attrs==25.1.0
      - click==7.1.2
      - click-default-group==1.2.4

      # Plotting / images
      - contourpy==1.3.1
      - cycler==0.12.1
      - fonttools==4.56.0
      - kiwisolver==1.4.8
      - pyparsing==3.2.1
      - opencv-python-headless==4.13.0.90

      # NVIDIA Python bindings
      - nvidia-ml-py==13.590.48
      - pynvml==13.0.1

      # Triton (CUDA kernel compiler used by torch)
      - triton==3.1.0

      # Misc
      - Jinja2==3.1.5
      - MarkupSafe==3.0.2
      - sympy==1.13.1
      - mpmath==1.3.0
      - typing_extensions==4.12.2
      - packaging==24.2
      - six==1.17.0
      - python-dateutil==2.9.0.post0
      - pytz==2025.1
      - tzdata==2025.1
      - importlib_metadata==8.6.1
      - zipp==3.21.0